<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keiba Parser Manager</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="競馬Parser">
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--accent:#2563eb;--good:#16a34a;--warn:#d97706;--bad:#dc2626}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px;background:linear-gradient(135deg,#172554,#2563eb);color:white}header h1{margin:0 0 6px;font-size:22px}header p{margin:0;opacity:.9;font-size:13px}
    main{max-width:1400px;margin:0 auto;padding:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 4px 14px rgba(15,23,42,.04);margin-bottom:12px}
    h2{font-size:18px;margin:0 0 12px}h3{font-size:15px;margin:14px 0 8px}label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
    input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:white}
    textarea{min-height:220px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
    button{border:0;border-radius:10px;padding:10px 12px;background:var(--accent);color:white;font-weight:700;cursor:pointer}
    button.secondary{background:#64748b}button.danger{background:var(--bad)}button.ghost{background:white;color:var(--accent);border:1px solid var(--line)}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.row>*{flex:1}
    .tabs{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}.tab{background:white;color:var(--text);border:1px solid var(--line);white-space:nowrap}.tab.active{background:var(--accent);color:white}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:980px}th,td{border-bottom:1px solid var(--line);padding:7px;text-align:left;vertical-align:top}th{background:#f8fafc;color:#334155;position:sticky;top:0;z-index:1}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:68vh}.muted{color:var(--muted);font-size:12px}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:700;background:#e0e7ff;color:#3730a3}
    .summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}.metric{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px}.metric b{font-size:20px;display:block;margin-top:4px}
    .ok{color:var(--good);font-weight:800}.warn{color:var(--warn);font-weight:800}.bad{color:var(--bad);font-weight:800}
    .columns{display:flex;gap:8px;flex-wrap:wrap}.colcheck{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;padding:6px 9px;background:white;font-size:12px}.colcheck input{width:auto}
    .code{background:#0f172a;color:#e5e7eb;border-radius:12px;padding:10px;overflow:auto;font-size:12px;max-height:300px}.split{display:grid;grid-template-columns:340px 1fr;gap:12px}.list{display:flex;flex-direction:column;gap:8px}.item{padding:10px;border:1px solid var(--line);border-radius:12px;background:white;cursor:pointer}.item.active{border-color:var(--accent);background:#eff6ff}
    @media(max-width:900px){main{padding:8px}.summary,.split{grid-template-columns:1fr}.card{padding:12px}textarea{min-height:240px}}
  </style>
</head>
<body>
<header><h1>競馬データ統一Parser</h1><p>雑コピペ → 正規化 → 表形式 → 保存/分析用JSON。無料・ローカル処理優先。</p></header>
<main>
  <div class="tabs">
    <button class="tab active" onclick="showMainTab('parser')">貼り付けParser</button>
    <button class="tab" onclick="showMainTab('saved')">保存データ</button>
    <button class="tab" onclick="showMainTab('manual')">手入力</button>
    <button class="tab" onclick="showMainTab('settings')">項目/ルール</button>
  </div>

  <section id="tab-parser" class="card">
    <h2>貼り付け入力</h2>
    <p class="muted">競馬サイトから雑にコピーしたテキストを貼り付け。取れない項目は空欄にします。</p>
    <textarea id="rawInput" placeholder="ここに競馬データを貼り付け"></textarea>
    <div class="row" style="margin-top:10px;">
      <button onclick="parseInput()">解析して表にする</button>
      <button class="secondary" onclick="saveParsedRace()">解析結果を保存</button>
      <button class="ghost" onclick="loadSample()">サンプル投入</button>
      <button class="ghost" onclick="clearInput()">クリア</button>
    </div>
    <div class="summary">
      <div class="metric">検出馬数<b id="statHorseCount">0</b></div>
      <div class="metric">過去走数<b id="statPastCount">0</b></div>
      <div class="metric">抽出品質<b id="statQuality">-</b></div>
      <div class="metric">保存状態<b id="statSaved">未保存</b></div>
    </div>
    <h3>表示カラム</h3><div id="columnSelector" class="columns"></div>
    <h3>出走馬テーブル</h3><div class="table-wrap" id="horseOutput"></div>
    <h3>過去走テーブル</h3><div class="table-wrap" id="pastOutput"></div>
    <h3>解析JSON</h3>
    <div class="row"><button class="ghost" onclick="copyJson()">JSONコピー</button><button class="ghost" onclick="downloadJson()">JSONダウンロード</button></div>
    <pre id="jsonOutput" class="code">{}</pre>
  </section>

  <section id="tab-saved" class="card" style="display:none;">
    <h2>保存データ</h2>
    <div class="split">
      <div>
        <div class="row"><button class="ghost" onclick="exportAll()">全データ出力</button><button class="danger" onclick="clearAllData()">全削除</button></div>
        <label>JSON読込</label><input type="file" onchange="importAll(event)">
        <h3>保存済みレース</h3><div id="savedList" class="list"></div>
      </div>
      <div><h3>保存データ詳細</h3><div id="savedDetail"></div></div>
    </div>
  </section>

  <section id="tab-manual" class="card" style="display:none;">
    <h2>手入力</h2>
    <div class="row">
      <div><label>馬名</label><input id="mHorse"></div><div><label>騎手</label><input id="mJockey"></div><div><label>斤量</label><input id="mWeight"></div>
      <div><label>性齢</label><input id="mSexAge"></div><div><label>脚質</label><input id="mStyle"></div><div><label>メモ</label><input id="mMemo"></div>
    </div>
    <button style="margin-top:10px;" onclick="addManualHorse()">手入力追加</button>
    <div class="table-wrap" style="margin-top:12px;" id="manualTable"></div>
  </section>

  <section id="tab-settings" class="card" style="display:none;">
    <h2>項目/ルール設定</h2>
    <p class="muted">列、正規化辞書、Parserルールを分離。後から parser.js を更新して精度改善できます。</p>
    <h3>内部カラム定義</h3><pre id="schemaView" class="code"></pre>
    <h3>正規化辞書</h3><pre id="dictView" class="code"></pre>
    <h3>Parserルール</h3><pre id="rulesView" class="code"></pre>
  </section>
</main>
<script src="./parser.js"></script>
<script src="./app.js"></script>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(console.log));}
</script>
</body></html>
